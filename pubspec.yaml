name: trainer_app
description: Помощник тренера - мобильное приложение
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # HTTP
  dio: ^5.4.0
  
  # State management
  provider: ^6.1.1
  
  # Local storage
  shared_preferences: ^2.2.2
  
  # Navigation
  go_router: ^13.2.0
  
  # UI
  material_color_utilities: ^0.8.0
  
  # JWT decode
  jwt_decoder: ^2.0.1
  
  # Date formatting
  intl: ^0.19.0

  firebase_core: ^3.4.0
  firebase_messaging: ^15.1.0
  flutter_local_notifications: ^18.0.1
  socket_io_client: ^2.0.3+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
